version: 2

project_name: kup

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/kpkym/kup/cmd.Version={{.Version}}
      - -X github.com/kpkym/kup/cmd.Commit={{.ShortCommit}}
      - -X github.com/kpkym/kup/cmd.Date={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: darwin
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
